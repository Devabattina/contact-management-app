<!DOCTYPE html>
<html>
<head>
    <title>Edit Contact</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h3>Edit Contact</h3>

<!-- Flash Messages -->
{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }}">{{ message }}</div>
    {% endfor %}
  {% endif %}
{% endwith %}

<form action="/update/{{ contact.id }}" method="POST">

    <input type="text" name="first_name" value="{{ contact.first_name }}" 
           placeholder="First Name" class="form-control mb-2" required>

    <input type="text" name="last_name" value="{{ contact.last_name }}" 
           placeholder="Last Name" class="form-control mb-2">

    <input type="text" name="address" value="{{ contact.address }}" 
           placeholder="Address" class="form-control mb-2">

    <input type="email" name="email" value="{{ contact.email }}" 
           placeholder="Email" class="form-control mb-2" required>

    <input type="text" name="phone" value="{{ contact.phone }}" 
           placeholder="Phone" class="form-control mb-2" required>

    <button class="btn btn-success">Update</button>
    <a href="/" class="btn btn-secondary">Cancel</a>

</form>

</body>
</html>
